<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METADATA EXTRACTOR // DARKNET EDITION // CORE v3.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.js"></script>
    
    <style>
        :root {
            --bg-color: #050505; /* Почти черный для фона */
            --text-color: #00ff00; /* Ярко-зеленый "матричный" текст */
            --accent-color: #ff0000; /* Красный для предупреждений и акцентов */
            --hint-color: #00cc00; /* Более тусклый зеленый для подсказок */
            --border-color: #00ff00; /* Зеленые границы */
            --secondary-bg: #101010; /* Чуть светлее черный для блоков */
            --font-family: 'Courier New', Courier, monospace; /* Моноширинный шрифт */
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.7); /* Эффект свечения */
        }

        .container {
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-sizing: border-box;
            background-color: rgba(0, 20, 0, 0.2); /* Едва заметный зеленый фон */
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .header h1 {
            font-size: 20px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header .version {
            font-size: 12px;
            color: var(--hint-color);
        }

        .upload-box {
            border: 2px dashed var(--border-color);
            border-radius: 0; /* Убираем скругления */
            padding: 40px 10px;
            text-align: center;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--secondary-bg);
            display: block; /* Чтобы метка вела себя как блок */
        }

        .upload-box:hover {
            background-color: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        input[type="file"] {
            display: none;
        }

        .btn-upload {
            display: inline-block;
            background-color: transparent;
            color: var(--text-color);
            padding: 12px 24px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-upload:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        #preview {
            width: 100%;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            display: none;
            filter: grayscale(100%) brightness(80%) contrast(120%); /* Мрачный фильтр для фото */
        }

        .map-box {
            background-color: rgba(255, 0, 0, 0.1); /* Красный фон для важных данных */
            border: 1px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 25px;
            display: none;
            color: var(--accent-color);
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.7);
        }

        .map-box strong {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .map-link {
            display: block;
            margin-top: 10px;
            color: var(--bg-color);
            background-color: var(--accent-color);
            text-align: center;
            padding: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .map-link:hover {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .data-container {
            margin-top: 20px;
        }

        .data-container h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            word-break: break-all;
        }

        th {
            color: var(--hint-color);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: rgba(0, 255, 0, 0.05);
        }

        .hidden { display: none; }

        /* Эффект печатающегося текста для заголовка */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        .typing-effect {
            overflow: hidden;
            border-right: 2px solid var(--text-color);
            white-space: nowrap;
            margin: 0 auto;
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--text-color); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="typing-effect">ЗАХВАТ МЕТАДАННЫХ</h1>
        <div class="version"></div>
    </div>
    
    <label for="file-input" class="upload-box" id="drop-area">
        <p>>>> ОЖИДАНИЕ ВХОДНОГО ФАЙЛА...</p>
        <p style="font-size: 12px; color: var(--hint-color);"></p>
        <span class="btn-upload">ВЫБРАТЬ ЦЕЛЬ</span>
        <input type="file" id="file-input" accept="image/*">
    </label>

    <img id="preview" alt="ОБРАЗ ЦЕЛИ">

    <div id="map-container" class="map-box">
        <strong>📍 ГЕОЛОКАЦИЯ ОБНАРУЖЕНА:</strong>
        <div id="coords-text" style="margin-top: 8px; font-family: monospace; font-size: 1.2em;"></div>
        <a id="google-maps" class="map-link" target="_blank">ПОКАЗАТЬ НА КАРТЕ</a>
        <a id="yandex-maps" class="map-link" target="_blank" style="background-color: #ffcc00; color: #000;">ПОКАЗАТЬ НА КАРТЕ</a>
    </div>

    <div id="data-container" class="data-container hidden">
        <h3>>>> РЕЗУЛЬТАТЫ СКАНИРОВАНИЯ EXIF:</h3>
        <table>
            <thead>
                <tr>
                    <th>ПАРАМЕТР</th>
                    <th>ЗНАЧЕНИЕ</th>
                </tr>
            </thead>
            <tbody id="meta-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const mapContainer = document.getElementById('map-container');
    const dataContainer = document.getElementById('data-container');
    const metaTable = document.getElementById('meta-table-body');
    const coordsText = document.getElementById('coords-text');

    // Функция конвертации координат в десятичный формат
    function toDecimal(number, ref) {
        if (!number) return null;
        const decimal = number[0] + (number[1] / 60) + (number[2] / 3600);
        return (ref === "S" || ref === "W") ? decimal * -1 : decimal;
    }

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Очистка предыдущих результатов
        metaTable.innerHTML = '';
        mapContainer.style.display = 'none';
        dataContainer.classList.add('hidden');
        
        // Показ превью с задержкой для эффекта "загрузки"
        const reader = new FileReader();
        reader.onload = (event) => {
            preview.src = event.target.result;
            preview.style.display = 'block';
        };
        
        // Имитация процесса сканирования
        tg.showScanQrPopup({text: "Идет глубокое сканирование файла..."});
        setTimeout(() => {
            tg.closeScanQrPopup();
            reader.readAsDataURL(file);
            
            // Работа с EXIF после "сканирования"
            EXIF.getData(file, function() {
                const allTags = EXIF.getAllTags(this);
                
                if (Object.keys(allTags).length === 0) {
                    tg.showAlert(">>> ОШИБКА: Метаданные не найдены. Файл защищен или очищен.");
                    return;
                }

                // Обработка GPS
                const lat = toDecimal(allTags.GPSLatitude, allTags.GPSLatitudeRef);
                const lon = toDecimal(allTags.GPSLongitude, allTags.GPSLongitudeRef);

                if (lat && lon) {
                    mapContainer.style.display = 'block';
                    const latFixed = lat.toFixed(6);
                    const lonFixed = lon.toFixed(6);
                    coordsText.innerText = ``;
                    document.getElementById('google-maps').href = `https://www.google.com/maps?q=${latFixed},${lonFixed}`;
                    document.getElementById('yandex-maps').href = `https://yandex.ru/maps/?text=${latFixed},${lonFixed}`;
                }

                // Заполнение таблицы данными
                for (let tag in allTags) {
                    if (tag === 'thumbnail' || typeof allTags[tag] === 'object' && !Array.isArray(allTags[tag])) continue;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${tag.toUpperCase()}</td><td>${allTags[tag]}</td>`;
                    metaTable.appendChild(row);
                }
                dataContainer.classList.remove('hidden');
            });
        }, 1500); // Задержка 1.5 секунды
    });
</script>

</body>
</html>
